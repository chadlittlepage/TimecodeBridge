<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TimecodeBridge Consumer Example</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 2rem; }
    #tc { font-size: 3rem; color: #4a556c; }
    #log { margin-top: 1rem; font-size: 0.8rem; color: #888; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>TimecodeBridge Consumer</h2>
  <div id="tc">--:--:--:--</div>
  <div id="info">Connecting...</div>
  <div id="log"></div>

  <script src="../lib/tcbridge.js"></script>
  <script>
    const bridge = new TimecodeBridge("ws://localhost:9876");
    const tcEl = document.getElementById("tc");
    const infoEl = document.getElementById("info");
    const logEl = document.getElementById("log");

    function log(msg) {
      const div = document.createElement("div");
      div.textContent = `${new Date().toLocaleTimeString()} ${msg}`;
      logEl.prepend(div);
      if (logEl.children.length > 50) logEl.lastChild.remove();
    }

    bridge.on("connect", () => { infoEl.textContent = "Connected"; log("Connected"); });
    bridge.on("disconnect", () => { infoEl.textContent = "Disconnected"; log("Disconnected"); });

    bridge.on("timecode", (data) => {
      tcEl.textContent = data.tc;
    });

    bridge.on("timeline", (info) => {
      log(`Timeline: ${info.project} / ${info.timeline} @ ${info.fps}fps`);
    });

    bridge.on("markers", (markers) => {
      log(`Received ${markers.length} markers`);
    });
  </script>
</body>
</html>
