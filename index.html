<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timecode Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", "Consolas", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
    }

    h1 {
      font-size: 1rem;
      font-weight: 400;
      color: #4a556c;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      margin-bottom: 2rem;
    }

    #timecode {
      font-size: 6rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(74, 85, 108, 0.5);
      transition: opacity 0.15s ease;
      min-height: 7rem;
    }

    #timecode.stale { opacity: 0.3; }

    .meta {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: #666;
      line-height: 1.8;
    }

    .meta span { color: #4a556c; }

    /* Source badge */
    #source-badge {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.25rem 0.7rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #source-badge.api { background: #3a3520; color: #f0a030; }
    #source-badge.ltc { background: #1a3520; color: #4caf50; }
    #source-badge.none { background: #2a2a3e; color: #555; }

    /* Status */
    #status {
      position: fixed;
      top: 1rem;
      right: 1rem;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      background: #2a2a3e;
    }

    #status.connected { color: #4caf50; }
    #status.disconnected { color: #f44336; }
    #status.connecting { color: #ff9800; }

    /* Controls panel */
    .controls {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      font-size: 0.75rem;
      color: #444;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .control-row {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .controls input, .controls select {
      background: #2a2a3e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 0.3rem 0.5rem;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.75rem;
    }

    .controls input { width: 220px; }
    .controls select { width: 180px; }

    .controls button {
      background: #4a556c;
      border: none;
      color: #fff;
      padding: 0.3rem 0.8rem;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
    }

    .controls button:hover { background: #5a6580; }
    .controls button.active { background: #2e7d32; }
    .controls button.active:hover { background: #388e3c; }

    .controls label { color: #666; margin-right: 0.3rem; }
  </style>
</head>
<body>
  <div id="status" class="connecting">connecting...</div>

  <div class="container">
    <h1>Timecode Bridge</h1>
    <div id="timecode">--:--:--:--</div>
    <div id="source-badge" class="none">--</div>
    <div class="meta">
      <div>Project: <span id="project">--</span></div>
      <div>Timeline: <span id="timeline">--</span></div>
      <div>FPS: <span id="fps">--</span></div>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <label>WS:</label>
      <input id="wsUrl" type="text" placeholder="ws://192.168.1.x:9876" />
      <button onclick="reconnectWS()">Connect</button>
    </div>
    <div class="control-row">
      <label>LTC:</label>
      <select id="ltcDevice"><option value="">-- select audio device --</option></select>
      <button id="ltcBtn" onclick="toggleLTC()">Enable LTC</button>
    </div>
  </div>

  <script src="browser/ltc-decoder.js"></script>
  <script>
    // ---- DOM refs ----
    const tcEl = document.getElementById("timecode");
    const statusEl = document.getElementById("status");
    const projectEl = document.getElementById("project");
    const timelineEl = document.getElementById("timeline");
    const fpsEl = document.getElementById("fps");
    const wsUrlInput = document.getElementById("wsUrl");
    const badgeEl = document.getElementById("source-badge");
    const ltcDeviceSelect = document.getElementById("ltcDevice");
    const ltcBtn = document.getElementById("ltcBtn");

    // ---- State ----
    const state = {
      api: { tc: null, ts: 0 },
      ltc: { tc: null, ts: 0, active: false, receiving: false },
    };

    let ws = null;
    let reconnectTimer = null;
    const ltcDecoder = new LTCDecoder();

    // ---- Source merge ----
    function updateDisplay() {
      const now = Date.now();
      const ltcFresh = state.ltc.active && state.ltc.receiving;

      let tc, source;
      if (ltcFresh) {
        tc = state.ltc.tc;
        source = "ltc";
      } else if (state.api.tc) {
        tc = state.api.tc;
        source = "api";
      } else {
        tc = "--:--:--:--";
        source = "none";
      }

      tcEl.textContent = tc;
      badgeEl.textContent = source === "ltc" ? "LTC" : source === "api" ? "API" : "--";
      badgeEl.className = source;
    }

    // ---- Path A: WebSocket ----
    function defaultWsUrl() {
      const host = location.hostname || "localhost";
      return `ws://${host}:9876`;
    }

    wsUrlInput.value = localStorage.getItem("tc_bridge_url") || defaultWsUrl();

    function setStatus(s, text) {
      statusEl.className = s;
      statusEl.textContent = text;
    }

    function connectWS(url) {
      if (ws) { ws.close(); ws = null; }
      setStatus("connecting", "connecting...");

      try { ws = new WebSocket(url); }
      catch { setStatus("disconnected", "invalid URL"); return; }

      ws.onopen = () => {
        setStatus("connected", "connected");
        tcEl.classList.remove("stale");
        localStorage.setItem("tc_bridge_url", url);
      };

      ws.onclose = () => {
        setStatus("disconnected", "disconnected");
        if (!state.ltc.receiving) tcEl.classList.add("stale");
        clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(() => connectWS(url), 2000);
      };

      ws.onerror = () => {};

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch { return; }

        if (data.type === "timecode") {
          state.api.tc = data.tc;
          state.api.ts = Date.now();
          tcEl.classList.remove("stale");
          updateDisplay();
        } else if (data.type === "timeline_info") {
          projectEl.textContent = data.project || "--";
          timelineEl.textContent = data.timeline || "--";
          fpsEl.textContent = data.fps || "--";
        } else if (data.type === "error") {
          if (!state.ltc.receiving) tcEl.classList.add("stale");
        }
      };
    }

    function reconnectWS() {
      const url = wsUrlInput.value.trim();
      if (url) { clearTimeout(reconnectTimer); connectWS(url); }
    }

    wsUrlInput.addEventListener("keydown", (e) => { if (e.key === "Enter") reconnectWS(); });

    // ---- Path B: LTC Audio ----
    ltcDecoder.onTimecode = (tc) => {
      state.ltc.tc = tc;
      state.ltc.ts = Date.now();
      tcEl.classList.remove("stale");
      updateDisplay();
    };

    ltcDecoder.onStateChange = (receiving) => {
      state.ltc.receiving = receiving;
      updateDisplay();
    };

    async function populateDevices() {
      const devices = await LTCDecoder.listDevices();
      // Clear existing options except the placeholder
      ltcDeviceSelect.length = 1;
      for (const d of devices) {
        const opt = document.createElement("option");
        opt.value = d.deviceId;
        opt.textContent = d.label || `Audio Input ${d.deviceId.slice(0, 8)}`;
        // Highlight likely virtual devices
        if (/blackhole|sonobus|virtual|loopback/i.test(d.label)) {
          opt.textContent = "* " + opt.textContent;
        }
        ltcDeviceSelect.appendChild(opt);
      }
    }

    async function toggleLTC() {
      if (ltcDecoder.active) {
        ltcDecoder.stop();
        state.ltc.active = false;
        state.ltc.receiving = false;
        ltcBtn.textContent = "Enable LTC";
        ltcBtn.classList.remove("active");
        updateDisplay();
      } else {
        const deviceId = ltcDeviceSelect.value || undefined;
        try {
          await ltcDecoder.start(deviceId);
          state.ltc.active = true;
          ltcBtn.textContent = "Disable LTC";
          ltcBtn.classList.add("active");
          updateDisplay();
        } catch (err) {
          alert("LTC capture failed: " + err.message);
        }
      }
    }

    // ---- Init ----
    connectWS(wsUrlInput.value);
    populateDevices();
  </script>
</body>
</html>
